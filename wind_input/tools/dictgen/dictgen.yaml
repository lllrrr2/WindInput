# WindInput dictgen 配置文件
# 路径均相对于本配置文件所在目录解析

# 输入
jidian_path: ../../../.cache/rime-wubi/wubi86_jidian.dict.yaml
unigram_path: ../../../.cache/pinyin/unigram.txt

# 自定义补充词表（不存在则跳过）
custom_words_path: custom_words.txt

# 输出
# output_path 仅作为独立运行时的默认值；build_all.ps1 通过 -output 参数覆盖，直接输出到 build/data/
output_path: ../../../.cache/rime-wubi/wubi86_jidian.dict.out.yaml
output_name: wubi86_jidian
dropped_path: ../../../.cache/rime-wubi/wubi86_jidian.dict.filtered.tsv

# 生成文件中引用的扩展词库（写入 import_tables 段）
import_tables:
  - wubi86_jidian_extra
  #- wubi86_jidian_extra_district

# 权重归一化参数
target_median: 1000   # unigram 中位词频映射到此权重
weight_max: 9999
weight_min: 1
char_boost_factor: 1.3  # 单字权重倍增，让高频单字优先于低频词组

# 生僻字保底权重（无 unigram 命中时按原始优先级给底线权重）
fallback:
  priority_30: 180
  priority_20: 150
  priority_10: 120

# 简码优先级分层（一/二/三级简码权重固定在普通词条之上）
# 识别规则：单字 + 码长 ≤ 3，级别 = 码长；简码表直接从 jidian 原词库提取
# 权重区间参考极爽词库比例（一简≈99.7%最大值）：简码占权重顶部，普通词条严格在下方
shortcodes:
  enabled: true
  level1_weight: 9999      # 一级简码（25个，每码唯一）
  level2_base_weight: 9950 # 二级简码基础权重，组内按 jidian 顺序递减
  level3_base_weight: 9000 # 三级简码基础权重，组内按 jidian 顺序递减（900个槽）
regular_weight_max: 8999   # 普通词条权重上限，须低于 level3_base_weight

# 简码避让冲突报告（同一字在前缀关系的多个简码级别都占首位）
# 留空则不输出报告
conflict_report_path: ../../../.cache/rime-wubi/wubi86_jidian.shortcode_conflicts.tsv

# 简码降权待处理报告（仅含 level2_full4/level3_full4 中有竞争候选的条目）
# 包含权重差、候选类型等评估列，用于确定降权参数
demotion_report_path: ../../../.cache/rime-wubi/wubi86_jidian.demotion_candidates.tsv

# 简码降权策略（详见 STRATEGY.md）
# 当一个字同时占据简码和4码全码首选时，根据第二候选的权重决定是否对简码字降权
demotion:
  enabled: true
  filter_threshold: 200       # 第二候选权重低于此值直接忽略（极低频词/生僻字）
  single_char_promote_wt: 1000 # 单字第二候选权重 ≥ 此值时触发降权
  word_promote_wt: 800         # 词组第二候选权重 ≥ 此值时触发降权
  max_gap_ratio_single: 0.60   # 单字：gap/首字权重 > 此比例则保留（首字权重优势太大）
  max_gap_ratio_word: 0.65     # 词组：gap/首字权重 > 此比例则保留

# 内置过滤选项
drop_z_code: true       # 过滤 z 开头的编码（反查占位码）
drop_dollar: true       # 过滤 $ 开头的词条
drop_emoji: true        # 过滤含 emoji 的词条
drop_pure_latin: true   # 过滤纯 ASCII 词条
drop_pua: false         # 不过滤 PUA 字符（五笔字根字，合法生僻字）
require_cjk: false      # 不强制要求含 CJK（允许标点等）
max_code_len: 4         # 最大编码长度
max_text_len: 16        # 最大词条长度（Unicode 字符数）

# 手动过滤规则
# code_prefix: 过滤指定前缀的编码（优先级高于 code）
# code: 过滤精确匹配的编码
# except_codes: 例外编码列表（在过滤前缀内保留的特定编码）
# reason: 过滤原因标记（出现在 .filtered.tsv 中）
drop_rules:
  - code_prefix: co
    reason: co_shortcut
    except_codes:
      - cogw  # 驜
      - coqh  # 驎
      - coaw  # 鸡米花
