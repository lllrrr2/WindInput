# Wind Input 用户修正规则
# 文件位置: %APPDATA%\WindInput\shadow.yaml
# 此文件由程序自动管理，通常不需要手动编辑

rules:
  # ========================================
  # 示例：五笔编码 aaaa 的修正规则
  # ========================================
  aaaa:
    # 置顶 "工" 字（优先显示）
    - word: "工"
      action: "top"

    # 删除（隐藏）不常用的词
    - word: "恭喜发财"
      action: "delete"

  # ========================================
  # 示例：调整权重
  # ========================================
  bbbb:
    - word: "子"
      action: "reweight"
      weight: 9999

  # ========================================
  # 操作类型说明：
  # - top: 置顶，该词会显示在候选列表最前面
  # - delete: 删除（隐藏），该词不会出现在候选列表中
  # - reweight: 调整权重，数值越大排序越靠前
  # ========================================
