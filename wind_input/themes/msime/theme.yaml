meta:
  name: "微软风格"
  version: "2.0"
  author: "清风输入法"
  order: 1

style:
  index_style: "text"
  accent_bar_color: "#0078D4"
  index_font_weight: 400
  item_padding_left: 8
  item_padding_right: 8
  window_padding_x: 8
  window_padding_y: 6
  always_show_pager: true

light:
  candidate_window:
    background_color: "#FFFFFF"
    border_color: "#E5E5E5"
    text_color: "#1A1A1A"
    index_color: "#888888"
    index_bg_color: "#0078D4"
    hover_bg_color: "#F0F0F0"
    selected_bg_color: "#F0F0F0"
    input_bg_color: "#F5F5F5"
    input_text_color: "#666666"
    comment_color: "#999999"
    shadow_color: "#00000008"

  toolbar:
    background_color: "#FFFFFF"
    border_color: "#E0E0E0"
    grip_color: "#C0C0C0B3"
    mode_chinese_bg_color: "#0078D4"
    mode_english_bg_color: "#8A8A8A"
    mode_text_color: "#FFFFFF"
    full_width_on_bg_color: "#0078D4"
    full_width_off_bg_color: "#F0F0F0"
    full_width_on_color: "#FFFFFF"
    full_width_off_color: "#666666"
    punct_chinese_bg_color: "#0078D4"
    punct_english_bg_color: "#F0F0F0"
    punct_chinese_color: "#FFFFFF"
    punct_english_color: "#666666"
    settings_bg_color: "#F0F0F0"
    settings_icon_color: "#666666"
    settings_hole_color: "#F0F0F0"

  popup_menu:
    background_color: "#FFFFFF"
    border_color: "#E0E0E0"
    text_color: "#1A1A1A"
    disabled_color: "#AAAAAA"
    hover_bg_color: "#EBF0FE"
    hover_text_color: "#1A1A1A"
    separator_color: "#E5E5E5"

  tooltip:
    background_color: "#2D2D2DF0"
    text_color: "#FFFFFF"

  mode_indicator:
    background_color: "#2D2D2DE6"
    text_color: "#FFFFFF"

dark:
  candidate_window:
    background_color: "#2B2B2B"
    border_color: "#3C3C3C"
    text_color: "#E4E4E4"
    index_color: "#999999"
    index_bg_color: "#4CC2FF"
    hover_bg_color: "#3D3D3D"
    selected_bg_color: "#3D3D3D"
    input_bg_color: "#383838"
    input_text_color: "#A0A0A0"
    comment_color: "#787878"
    shadow_color: "#0000001A"

  toolbar:
    background_color: "#2B2B2B"
    border_color: "#3C3C3C"
    grip_color: "#5A5A5AB3"
    mode_chinese_bg_color: "#4CC2FF"
    mode_english_bg_color: "#5A5A5A"
    mode_text_color: "#1A1A1A"
    full_width_on_bg_color: "#4CC2FF"
    full_width_off_bg_color: "#3C3C3C"
    full_width_on_color: "#1A1A1A"
    full_width_off_color: "#A0A0A0"
    punct_chinese_bg_color: "#4CC2FF"
    punct_english_bg_color: "#3C3C3C"
    punct_chinese_color: "#1A1A1A"
    punct_english_color: "#A0A0A0"
    settings_bg_color: "#3C3C3C"
    settings_icon_color: "#A0A0A0"
    settings_hole_color: "#3C3C3C"

  popup_menu:
    background_color: "#2B2B2B"
    border_color: "#3C3C3C"
    text_color: "#E4E4E4"
    disabled_color: "#6A6A6A"
    hover_bg_color: "#3D3D3D"
    hover_text_color: "#E4E4E4"
    separator_color: "#3C3C3C"

  tooltip:
    background_color: "#1A1A1AF0"
    text_color: "#E4E4E4"

  mode_indicator:
    background_color: "#1A1A1AE6"
    text_color: "#E4E4E4"
