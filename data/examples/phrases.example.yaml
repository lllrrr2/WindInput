# Wind Input 特殊短语配置
# 文件位置: %APPDATA%\WindInput\phrases.yaml

phrases:
  # ========================================
  # 简单短语
  # ========================================
  - code: "ddzj"
    text: "独立资金"

  - code: "sjhm"
    text: "13800138000"

  - code: "email"
    text: "your@email.com"

  # ========================================
  # 带模板变量的短语
  # 支持的变量: {year}, {month}, {day}, {hour}, {minute}, {second}, {week}
  # ========================================
  - code: "rq"
    text: "{year}年{month}月{day}日"

  - code: "sj"
    text: "{hour}:{minute}:{second}"

  # ========================================
  # 多候选短语
  # ========================================
  - code: "xq"
    candidates:
      - "星期{week}"
      - "周{week}"

  # ========================================
  # 内置命令引用
  # 可用命令: date, time, datetime, week, uuid, timestamp
  # ========================================
  - code: "riqi"
    type: "command"
    handler: "date"

  - code: "shijian"
    type: "command"
    handler: "time"

  # ========================================
  # 常用短语示例
  # ========================================
  - code: "addr"
    text: "北京市朝阳区xxx路xxx号"

  - code: "zfbao"
    text: "支付宝"

  - code: "wx"
    text: "微信"
