schema:
  id: wubi86
  name: "五笔"
  icon_label: "五"
  version: "1.0"
  author: "内置"
  description: "五笔86版输入方案（基于rime-wubi86-jidian增加词频生成）"

engine:
  type: codetable
  codetable:
    max_code_length: 4
    auto_commit_unique: false
    clear_on_empty_max: false
    top_code_commit: true
    punct_commit: true
    show_code_hint: true
    single_code_input: false
    single_code_complete: true
    candidate_sort_mode: frequency
    z_key_repeat: true
    temp_pinyin:
      enabled: true
      schema: pinyin
  filter_mode: smart

dictionaries:
  - id: wubi86_main
    path: "wubi86/wubi86_jidian.dict.yaml"
    type: rime_codetable
    default: true

learning:
  auto_learn:
    enabled: false
  freq:
    enabled: false
    protect_top_n: 1

encoder:
  max_word_length: 10
  rules:
    - length_equal: 2
      formula: "AaAbBaBb"
    - length_equal: 3
      formula: "AaBaCaCb"
    - length_in_range: [4, 10]
      formula: "AaBaCaZa"
