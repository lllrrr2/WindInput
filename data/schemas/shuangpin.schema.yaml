schema:
  id: shuangpin
  name: "双拼"
  icon_label: "双"
  version: "1.0"
  author: "内置"
  description: "双拼输入方案，每个汉字固定两键输入，支持多种键位布局"

engine:
  type: pinyin
  pinyin:
    scheme: shuangpin
    shuangpin:
      layout: xiaohe
    show_code_hint: true
    use_smart_compose: true
    candidate_order: smart
    fuzzy:
      enabled: false
  filter_mode: smart

dictionaries:
  - id: pinyin_main
    path: "pinyin/rime_ice.dict.yaml"
    type: rime_pinyin
    default: true
    weight_spec:
      median: 200
      max: 19260817
      mode: log
  - id: codetable_reverse
    path: "wubi86/wubi86_jidian.dict.yaml"
    type: rime_codetable
    role: reverse_lookup

user_data:
  shadow_file: "shuangpin.shadow.yaml"
  user_dict_file: "shuangpin.userwords.txt"
  user_freq_file: "shuangpin.userfreq.txt"

learning:
  mode: manual
  unigram_path: "pinyin/unigram.txt"
