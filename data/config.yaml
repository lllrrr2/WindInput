# WindInput 系统预置配置
# 此文件为应用内置默认配置，随程序安装包分发。
# 加载优先级：代码默认值 → 本文件 → 用户配置（%APPDATA%\WindInput\config.yaml）
# 修改此文件可调整新安装或新版本升级后的默认行为，无需重新编译。

startup:
  remember_last_state: false
  default_chinese_mode: true
  default_full_width: false
  default_chinese_punct: true

schema:
  active: "wubi86"
  available:
    - "wubi86"
    - "pinyin"

hotkeys:
  toggle_mode_keys:
    - "lshift"
    - "rshift"
  commit_on_switch: true
  switch_engine: "ctrl+`"
  toggle_full_width: "shift+space"
  toggle_punct: "ctrl+."

ui:
  font_size: 18
  candidates_per_page: 7
  font_path: ""
  inline_preedit: true
  candidate_layout: "horizontal"
  status_indicator_duration: 800
  status_indicator_offset_x: 0
  status_indicator_offset_y: 0
  tooltip_delay: 200
  theme: "default"
  theme_style: "system"
  text_render_mode: "directwrite"
  gdi_font_weight: 500
  gdi_font_scale: 1.0
  menu_font_weight: 500
  menu_font_size: 12.0

toolbar:
  visible: true

input:
  punct_follow_mode: false
  select_key_groups:
    - "semicolon_quote"
  page_keys:
    - "pageupdown"
    - "minus_equal"
  highlight_keys:
    - "arrows"
  pinyin_separator: "auto"
  shift_temp_english:
    enabled: true
    show_english_candidates: true
  capslock_behavior:
    cancel_on_mode_switch: false
  temp_pinyin:
    trigger_keys:
      - "backtick"

advanced:
  log_level: "info"
  host_render_processes:
    - "SearchHost.exe"
