# WindInput 系统预置配置
# 此文件为应用内置默认配置，随程序安装包分发。
# 加载优先级：代码默认值 → 本文件 → 用户配置（%APPDATA%\WindInput\config.yaml）
# 修改此文件可调整新安装或新版本升级后的默认行为，无需重新编译。

startup:
  remember_last_state: false
  default_chinese_mode: true
  default_full_width: false
  default_chinese_punct: true

schema:
  active: "wubi86"
  available:
    - "wubi86"
    - "wubi86_pinyin"

hotkeys:
  toggle_mode_keys:
    - "lshift"
    - "rshift"
  commit_on_switch: true
  switch_engine: "ctrl+shift+e"
  toggle_full_width: "shift+space"
  toggle_punct: "ctrl+."
  delete_candidate: ctrl+shift+number
  pin_candidate: ctrl+number
  toggle_toolbar: ctrl+shift+\
  open_settings: ctrl+shift+]
  add_word: ctrl+equal
  global_hotkeys: []

ui:
  font_size: 18
  candidates_per_page: 7
  font_path: ""
  inline_preedit: true
  hide_candidate_window: false
  candidate_layout: "horizontal"
  status_indicator_duration: 800
  status_indicator_offset_x: 0
  status_indicator_offset_y: 0
  tooltip_delay: 200
  theme: "default"
  theme_style: "system"
  text_render_mode: "directwrite"
  gdi_font_weight: 500
  gdi_font_scale: 1.0
  menu_font_weight: 500
  menu_font_size: 12.0

toolbar:
  visible: true

input:
  punct_follow_mode: false
  filter_mode: smart
  select_key_groups:
    - semicolon_quote
  page_keys:
    - pageupdown
    - minus_equal
  highlight_keys:
    - arrows
    - tab
  smart_punct_after_digit: true
  smart_punct_list: ".,:"
  pinyin_separator: auto
  shift_temp_english:
    enabled: true
    show_english_candidates: true
  capslock_behavior:
    cancel_on_mode_switch: false
  temp_pinyin:
    trigger_keys:
      - backtick
    auto_pair:
      chinese: true
      english: true
      blacklist: []
      chinese_pairs:
        - "（）"
        - "【】"
        - "｛｝"
        - "《》"
        - "〈〉"
      english_pairs:
        - "()"
        - "[]"
        - "{}"
advanced:
  log_level: "info"
  host_render_processes:
    - "SearchHost.exe"
